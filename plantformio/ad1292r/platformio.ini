; PlatformIO Project Configuration File
; ADS1292R ECG 采集项目
;
; 硬件: ESP32 标准版 (DevKit V1)
; 芯片: ADS1292R (ECG+呼吸)
;
; 串口输出: 921600 baud (500SPS 数据需要更高波特率)

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; 串口监视器波特率
monitor_speed = 921600

; 编译选项
build_flags =
    ; 启用所有警告
    -Wall
    ; SPI引脚可以在此覆盖（如果需要非默认引脚）
    ; -DADS1292R_SPI_SCLK=18
    ; -DADS1292R_SPI_MISO=19
    ; -DADS1292R_SPI_MOSI=23
